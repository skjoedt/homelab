---
apiVersion: v1
kind: ConfigMap
metadata:
  name: arm-config
data:
  arm.yaml: |
    # ARM (Automatic Ripping Machine) config file

    ARM_NAME: "homelab-arm"
    ARM_CHILDREN: ""

    PREVENT_99: true
    ARM_CHECK_UDF: true
    UMASK: 0o002
    GET_VIDEO_TITLE: true
    ARM_API_KEY: ""
    DISABLE_LOGIN: false
    SKIP_TRANSCODE: false
    VIDEOTYPE: "auto"
    MINLENGTH: "600"
    MAXLENGTH: "99999"
    MANUAL_WAIT: true
    MANUAL_WAIT_TIME: 60
    DATE_FORMAT: "%m-%d-%Y %H:%M:%S"
    ALLOW_DUPLICATES: false
    MAX_CONCURRENT_TRANSCODES: 1
    MAX_CONCURRENT_MAKEMKVINFO: 0
    DATA_RIP_PARAMETERS: ""
    METADATA_PROVIDER: "omdb"
    GET_AUDIO_TITLE: "musicbrainz"
    RIP_POSTER: false
    AUTO_EJECT: true

    # Directory setup
    ABCDE_CONFIG_FILE: "/etc/arm/config/abcde.conf"
    RAW_PATH: "/home/arm/media/raw/"
    TRANSCODE_PATH: "/home/arm/media/transcode/"
    COMPLETED_PATH: "/home/arm/media/completed/"
    EXTRAS_SUB: "extras"
    LOGPATH: "/home/arm/logs/"
    LOGLEVEL: "INFO"
    LOGLIFE: 1

    # File permissions
    SET_MEDIA_PERMISSIONS: false
    CHMOD_VALUE: 777
    SET_MEDIA_OWNER: false
    CHOWN_USER:
    CHOWN_GROUP:

    # MakeMKV
    MAKEMKV_PERMA_KEY: ""
    RIPMETHOD: "mkv"
    RIPMETHOD_DVD: "PLACEHOLDER"
    RIPMETHOD_BR: "PLACEHOLDER"
    MKV_ARGS: ""
    DELRAWFILES: true

    # HandBrake - include Danish as primary, English as fallback
    HB_PRESET_DVD: "HQ 720p30 Surround"
    HB_PRESET_BD: "HQ 1080p30 Surround"
    DEST_EXT: mkv
    HANDBRAKE_CLI: HandBrakeCLI
    HANDBRAKE_LOCAL: HandBrakeCLI
    MAINFEATURE: false
    HB_ARGS_DVD: "--subtitle scan -F --audio-lang-list dan,eng --all-audio"
    HB_ARGS_BD: "--subtitle scan -F --subtitle-burned --audio-lang-list dan,eng --all-audio"

    # FFMPEG (unused)
    FFMPEG_CLI: FFMPEG
    FFMPEG_LOCAL: FFMPEG
    FFMPEG_PRE_FILE_ARGS:
    FFMPEG_POST_FILE_ARGS:
    USE_FFMPEG: false

    # Notifications (disabled)
    NOTIFY_RIP: false
    NOTIFY_TRANSCODE: false
    NOTIFY_JOBID: false
    PB_KEY: ""
    IFTTT_KEY: ""
    IFTTT_EVENT: "arm_event"
    PO_USER_KEY: ""
    PO_APP_KEY: ""
    BASH_SCRIPT: ""
    OMDB_API_KEY: ""
    TMDB_API_KEY: ""
    JSON_URL: ""
    APPRISE: ""

    WEBSERVER_PORT: 8080
    UI_BASE_URL: ""

  abcde.conf: |
    # abcde configuration for ARM - Danish audio CDs
    CDDBMETHOD=musicbrainz
    OUTPUTTYPE=flac
    OUTPUTDIR="/home/arm/media/completed"
    OUTPUTFORMAT='${ARTISTFILE}-${ALBUMFILE}/${TRACKNUM}.${TRACKFILE}'
    MUNGEFILENAME=
    CDROMREADERSYNTAX=cdparanoia
    CDPARANOIA=cdparanoia
    CDPARANOIAOPTS="--never-skip=40"
    LAME=lame
    LAMEOPTS="-b 320"
    FLAC=flac
    FLACOPTS="-s -8"
    MAXPROCS=2
    PADTRACKS=y
    EJECTCD=y
    COMMENT='Ripped with ARM'
