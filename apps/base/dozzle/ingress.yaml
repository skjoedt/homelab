---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dozzle
  namespace: dozzle
spec:
  ingressClassName: traefik
  rules:
    - host: dozzle.traefik.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dozzle
                port:
                  name: http-dozzle
