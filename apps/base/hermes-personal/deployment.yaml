---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes-personal
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
        app.kubernetes.io/name: hermes
        app.kubernetes.io/instance: hermes-personal
    spec:
      serviceAccountName: hermes
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:sha-bec2250d2c8349fc85201bcd1aa39bcaa766a555
          args: ["gateway", "run"]
          ports:
            - containerPort: 8642
              name: gateway
            - containerPort: 9119
              name: dashboard
          env:
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: OPENROUTER_API_KEY
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: API_SERVER_KEY
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_TUI
              value: "1"
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: hermes-data
