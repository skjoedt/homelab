---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-secrets
  namespace: hermes-personal
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: hermes-secrets
    template:
      type: Opaque
  data:
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: homelab/hermes-personal/openrouter-api
        property: OPENROUTER_API_KEY
    - secretKey: API_SERVER_KEY
      remoteRef:
        key: homelab/hermes-personal/app-secrets
        property: API_SERVER_KEY
