---
# Dev/k3d credentials for RustFS S3-compatible object store.
# Hardcoded test values — safe for base/dev only.
# Production uses cnpg-aws-credentials ExternalSecret (apps/production/home-assistant/external-secret.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: rustfs-credentials
  namespace: home-assistant
type: Opaque
stringData:
  ACCESS_KEY_ID: admin
  ACCESS_SECRET_KEY: password123
