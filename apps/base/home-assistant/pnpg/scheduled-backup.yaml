---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: homeassistant-db-backup-schedule
  namespace: home-assistant
spec:
  schedule: "0 0 0 * * *"
  backupOwnerReference: self
  cluster:
    name: homeassistant-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
