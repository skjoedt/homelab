---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nemmest-db-secret-reader
  namespace: nemmest
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nemmest-db-secret-reader
  namespace: nemmest
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nemmest-db-secret-reader
subjects:
  - kind: ServiceAccount
    name: nemmest-db
    namespace: nemmest
