---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: qui
        app.kubernetes.io/name: qui
        app.kubernetes.io/instance: qui
    spec:
      containers:
        - name: qui
          image: ghcr.io/autobrr/qui:v1.15.0
          ports:
            - containerPort: 7476
              name: http
          volumeMounts:
            - name: qui-config
              mountPath: /config
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: qui-config
          persistentVolumeClaim:
            claimName: qui-config-pvc
