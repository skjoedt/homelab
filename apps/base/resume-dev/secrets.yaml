---
# Dev placeholder secrets (used in base/k3d only).
# In production, these are replaced by ExternalSecret.
# Note: DATABASE_URL and POSTGRES_PASSWORD are no longer needed here - the resume
# app reads DATABASE_URL from the CNPG-generated secret (resume-db-app).
apiVersion: v1
kind: Secret
metadata:
  name: resume-secrets
  namespace: resume
type: Opaque
stringData:
  AUTH_SECRET: "insecure-auth-secret-change-in-production"
