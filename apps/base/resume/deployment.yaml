---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume
  namespace: resume
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: resume
  template:
    metadata:
      labels:
        app: resume
        app.kubernetes.io/name: resume
        app.kubernetes.io/instance: resume
    spec:
      initContainers:
        - name: postgres
          image: docker.io/postgres:15.17
          restartPolicy: Always
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: "postgres"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: resume-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: resume-storage
              mountPath: /var/lib/postgresql/data
              subPath: resume/postgres
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: 1
              memory: "512Mi"

      containers:
        - name: resume
          image: docker.io/amruthpillai/reactive-resume:v5.0.11
          ports:
            - containerPort: 3000
              name: http-resume
          env:
            - name: TZ
              value: "Europe/Copenhagen"
            - name: APP_URL
              value: "http://resume.traefik.me"
            - name: PRINTER_APP_URL
              value: "http://localhost:3000"
            - name: PRINTER_ENDPOINT
              value: "ws://localhost:4000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: resume-secrets
                  key: DATABASE_URL
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: resume-secrets
                  key: AUTH_SECRET
            - name: STORAGE_LOCAL_PATH
              value: "/app/data"
          volumeMounts:
            - name: resume-storage
              mountPath: /app/data
              subPath: resume/data
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: 1
              memory: "512Mi"

        - name: chromium
          image: ghcr.io/browserless/chromium:v2.42.0
          ports:
            - containerPort: 4000
              name: http-chromium
          env:
            - name: PORT
              value: "4000"
            - name: CONCURRENT
              value: "5"
            - name: QUEUED
              value: "10"
            - name: TIMEOUT
              value: "60000"
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: 2
              memory: "1Gi"

      volumes:
        - name: resume-storage
          persistentVolumeClaim:
            claimName: resume-pvc
