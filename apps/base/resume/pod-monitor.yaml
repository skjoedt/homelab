---
# PodMonitor for CNPG cluster metrics.
# Prometheus discovers this via podMonitorNamespaceSelector (podmonitorscrape: "true")
# which is configured in monitoring/controllers/kube-prometheus-stack/values.yaml.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: resume-db
  namespace: resume
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: resume-db
  podMetricsEndpoints:
    - port: metrics
