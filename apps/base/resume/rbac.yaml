---
# Grants the CNPG cluster service account permission to read Secrets in the resume
# namespace. Required for the barman-cloud plugin to access backup credentials
# (e.g. rustfs-credentials in dev, cnpg-aws-credentials in production).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: resume-db-secret-reader
  namespace: resume
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: resume-db-secret-reader
  namespace: resume
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: resume-db-secret-reader
subjects:
  - kind: ServiceAccount
    name: resume-db
    namespace: resume
