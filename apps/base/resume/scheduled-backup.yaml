---
# Scheduled backup: daily at midnight.
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: resume-db-backup-schedule
  namespace: resume
spec:
  schedule: "0 0 0 * * *"
  backupOwnerReference: self
  cluster:
    name: resume-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
