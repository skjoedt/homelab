---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: vaultwarden-db-backup
  namespace: vaultwarden
spec:
  configuration:
    destinationPath: s3://cnpg-backups/vaultwarden-db/
    endpointURL: http://rustfs.rustfs:9000
    s3Credentials:
      accessKeyId:
        name: cnpg-backup-credentials
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-backup-credentials
        key: SECRET_ACCESS_KEY
