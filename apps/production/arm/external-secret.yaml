---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arm-credentials
  namespace: arr
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: arm-credentials
    template:
      type: Opaque
  data:
    - secretKey: admin_password
      remoteRef:
        key: homelab/arm/user
        property: admin
    - secretKey: omdb_api_key
      remoteRef:
        key: homelab/omdb/api-key
        property: api_key
