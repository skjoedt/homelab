---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: resume-secrets
  namespace: resume
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: resume-secrets
    template:
      type: Opaque
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: homelab/resume/postgresql
        property: POSTGRES_PASSWORD
    - secretKey: DATABASE_URL
      remoteRef:
        key: homelab/resume/postgresql
        property: DATABASE_URL
    - secretKey: AUTH_SECRET
      remoteRef:
        key: homelab/resume/app-secrets
        property: AUTH_SECRET
