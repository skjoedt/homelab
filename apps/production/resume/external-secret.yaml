---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: resume-secrets
  namespace: resume
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: resume-secrets
    template:
      type: Opaque
  data:
    - secretKey: AUTH_SECRET
      remoteRef:
        key: homelab/resume/app-secrets
        property: AUTH_SECRET
---
# AWS credentials for CNPG Barman Cloud backups
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-aws-credentials
  namespace: resume
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: cnpg-aws-credentials
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: homelab/cnpg/aws-credentials
        property: AWS_ACCESS_KEY_ID
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: homelab/cnpg/aws-credentials
        property: AWS_SECRET_ACCESS_KEY
