---
# Test credentials for MinIO in dev/k3d environments.
# These are hardcoded test credentials (not secrets) — safe for base/dev only.
# Production uses cnpg-aws-credentials ExternalSecret (system/configs/production/cnpg/).
apiVersion: v1
kind: Secret
metadata:
  name: cnpg-minio-credentials
  namespace: resume
type: Opaque
stringData:
  ACCESS_KEY_ID: minioadmin
  ACCESS_SECRET_KEY: minioadmin
