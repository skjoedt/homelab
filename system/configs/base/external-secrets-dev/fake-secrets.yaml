---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    fake:
      data:
        - key: "homelab/traefik/dashboard-auth"
          value: admin:$apr1$WSFrF9R8$AmtnJxqJvFY83cITqXJfj1  # admin:admin
        - key: "homelab/immich/database"
          value: |
            {
              "DB_PASSWORD": "immich_password"
            }
        - key: "homelab/papra/app-secrets"
          value: |
            {
              "AUTH_SECRET": "insecure-auth-secret-change-in-production"
            }
        - key: "homelab/cnpg/aws-credentials"
          value: |
            {
              "AWS_ACCESS_KEY_ID": "admin",
              "AWS_SECRET_ACCESS_KEY": "password123"
            }
        - key: "homelab/resume/app-secrets"
          value: |
            {
              "AUTH_SECRET": "insecure-auth-secret-change-in-production"
            }
        - key: "homelab/dozzle/users"
          value: "users:\n  admin:\n    name: Admin\n    password: $2a$10$GQVDkDJPvHRbMZzp9oVEaOdDqCHarIMZFmX.7WJ8gMaBMRe8tHg5i\n    email: admin@example.com\n"
        - key: "homelab/hermes-personal/openrouter-api"
          value: |
            {
              "OPENROUTER_API_KEY": "dev-fake-openrouter-key"
            }
        - key: "homelab/hermes-personal/app-secrets"
          value: |
            {
              "API_SERVER_KEY": "dev-fake-api-server-key-change-in-production"
            }
