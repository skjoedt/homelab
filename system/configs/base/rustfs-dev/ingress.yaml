---
# Exposes the RustFS console UI at rustfs.localho.st in dev/k3d environments.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rustfs
  namespace: rustfs
spec:
  ingressClassName: traefik
  rules:
    - host: rustfs.localho.st
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rustfs
                port:
                  name: console
