---
# AWS credentials for CNPG Barman Cloud backups.
# This is a global secret referenced by all CNPG clusters that use S3 backups.
# The IAM user is cnpg-backup, managed by cloud/aws/cnpg/main.tf.
# The access key must be manually created and stored in AWS Secrets Manager
# at path: homelab/cnpg/aws-credentials
# with properties: ACCESS_KEY_ID, ACCESS_SECRET_KEY
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-aws-credentials
  namespace: resume
spec:
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: cnpg-aws-credentials
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: homelab/cnpg/aws-credentials
        property: ACCESS_KEY_ID
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: homelab/cnpg/aws-credentials
        property: ACCESS_SECRET_KEY
