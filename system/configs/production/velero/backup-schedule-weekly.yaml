---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: weekly-backup
  namespace: velero
spec:
  schedule: "0 3 * * 0"  # Weekly on Sunday at 3 AM
  template:
    ttl: 672h0m0s  # 4 weeks retention (28 days)
    includedNamespaces: ["*"]
    excludedNamespaces:
    - velero
    - kube-system
    - kube-public
    - kube-node-lease
    labelSelector:
      matchExpressions:
      - key: velero.io/exclude-from-backup
        operator: NotIn
        values: ["true"]
    snapshotVolumes: true
    defaultVolumesToFsBackup: false
    csiSnapshotTimeout: 10m0s
    storageLocation: aws-s3
    volumeSnapshotLocations:
    - csi-snapshots