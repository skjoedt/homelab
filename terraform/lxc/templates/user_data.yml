#cloud-config
users:
  - name: skjoedt
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: users, sudo
    shell: /bin/zsh
    ssh_import_id:
      - gh:skjoedt
    lock_passwd: true

package_update: true
packages:
  - git
  - ntp
  - zsh
  - linux-modules-extra-generic # needed for zigbee-dongle cp210x driver

runcmd:
  - echo 'cp210x' >> /etc/modules # needed for zigbee-dongle
  - echo 'fs.inotify.max_user_instances=512' >> /etc/sysctl.conf
  - echo 'fs.inotify.max_user_watches=524288' >> /etc/sysctl.conf
  - sysctl -p
